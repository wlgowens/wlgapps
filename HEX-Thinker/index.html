<script>
document.addEventListener('DOMContentLoaded', () => {

let hexes = [];
let currentPairs = [];
let currentNodeGroups = [];
let mode = 'pair';

const hexInput = document.getElementById('hexInput');
const board = document.getElementById('board');
const generateBtn = document.getElementById('generateBtn');
const clearBtn = document.getElementById('clearBtn');
const challengeBtn = document.getElementById('challengeBtn');
const promptBtn = document.getElementById('promptBtn');
const deleteZone = document.getElementById('deleteZone');

const HEX_WIDTH = 140;
const HEX_HEIGHT = 120;

function createHex(text, x, y) {
  const hex = document.createElement('div');
  hex.className = "hex absolute cursor-move select-none";
  hex.style.width = HEX_WIDTH + "px";
  hex.style.height = HEX_HEIGHT + "px";
  hex.style.left = x + "px";
  hex.style.top = y + "px";
  hex.textContent = text;

  board.appendChild(hex);
  makeDraggable(hex);

  hexes.push({ el: hex, text, x, y });
}

function generateHexes() {
  board.innerHTML = "";
  hexes = [];

  const values = hexInput.value.split('\n').map(v => v.trim()).filter(Boolean);
  values.forEach((val, i) => {
    createHex(val, 50 + (i % 4) * 160, 50 + Math.floor(i / 4) * 140);
  });
}

function clearBoard() {
  board.innerHTML = "";
  hexes = [];
}

generateBtn.onclick = generateHexes;
clearBtn.onclick = clearBoard;

function makeDraggable(el) {
  let offsetX, offsetY;

  function dragStart(e) {
    e.preventDefault();

    const rect = el.getBoundingClientRect();
    const event = e.touches ? e.touches[0] : e;
    offsetX = event.clientX - rect.left;
    offsetY = event.clientY - rect.top;

    document.onmousemove = document.ontouchmove = dragMove;
    document.onmouseup = document.ontouchend = dragEnd;
  }

  function dragMove(e) {
    const event = e.touches ? e.touches[0] : e;
    const boardRect = board.getBoundingClientRect();

    let x = event.clientX - boardRect.left - offsetX;
    let y = event.clientY - boardRect.top - offsetY;

    el.style.left = x + "px";
    el.style.top = y + "px";

    const r = deleteZone.getBoundingClientRect();
    const cx = event.clientX;
    const cy = event.clientY;

    if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom) {
      deleteZone.classList.add('bg-red-700');
    } else {
      deleteZone.classList.remove('bg-red-700');
    }
  }

  function dragEnd(e) {
    const event = e.changedTouches ? e.changedTouches[0] : e;
    const r = deleteZone.getBoundingClientRect();
    const cx = event.clientX;
    const cy = event.clientY;

    if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom) {
      el.remove();
      hexes = hexes.filter(h => h.el !== el);
    }

    deleteZone.classList.remove('bg-red-700');
    document.onmousemove = document.ontouchmove = null;
    document.onmouseup = document.ontouchend = null;
  }

  el.onmousedown = el.ontouchstart = dragStart;
}

challengeBtn.onclick = () => {
  mode = mode === 'pair' ? 'node' : 'pair';
  alert("Mode switched to: " + mode);
};

promptBtn.onclick = () => {
  currentPairs = [];
  currentNodeGroups = [];

  if (hexes.length < 2) return;

  const texts = hexes.map(h => h.text);

  for (let i = 0; i < texts.length - 1; i++) {
    currentPairs.push([texts[i], texts[i + 1]]);
  }

  currentNodeGroups = [texts.slice(0, 3)];

  const group = mode === 'pair'
    ? currentPairs[Math.floor(Math.random() * currentPairs.length)]
    : currentNodeGroups[Math.floor(Math.random() * currentNodeGroups.length)];

  if (!group) return;

  alert("Discuss connection between:\n\n" + group.join(" & "));
};

function generateAndDownloadImage() {

  if (hexes.length === 0) {
    alert("No hexes to export.");
    return;
  }

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  hexes.forEach(h => {
    const x = parseInt(h.el.style.left);
    const y = parseInt(h.el.style.top);
    minX = Math.min(minX, x);
    minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + HEX_WIDTH);
    maxY = Math.max(maxY, y + HEX_HEIGHT);
  });

  const canvas = document.createElement('canvas');
  canvas.width = maxX - minX + 20;
  canvas.height = maxY - minY + 20;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "black";
  ctx.font = "14px Arial";

  hexes.forEach(h => {
    const x = parseInt(h.el.style.left) - minX + 10;
    const y = parseInt(h.el.style.top) - minY + 10;

    ctx.strokeRect(x, y, HEX_WIDTH, HEX_HEIGHT);
    ctx.fillText(h.text, x + 10, y + 60);
  });

  const link = document.createElement('a');
  link.download = "hex-board.png";
  link.href = canvas.toDataURL();
  link.click();
}

document.getElementById('saveBtn').onclick = generateAndDownloadImage;

function generateStudentLink() {
  const hexValues = hexes.map(h => h.text.trim()).filter(Boolean);
  if (hexValues.length === 0) {
    alert("Please create at least one hex.");
    return;
  }

  const t = hexValues.join('|');
  const u = new URL(window.location.href);
  u.searchParams.set('t', t);

  const link = u.toString();
  navigator.clipboard.writeText(link).then(() => {
    alert("Student link copied to clipboard!");
  }).catch(() => {
    prompt("Copy this link:", link);
  });
}

document.getElementById('linkBtn').onclick = generateStudentLink;

const params = new URLSearchParams(window.location.search);
const t = params.get('t');

if (t) {
  hexInput.value = t.split('|').join('\n');
}

});
</script>
